  # ============================================

  NetFWDeletionProtection
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-deletion-protection-enabled
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_DELETION_PROTECTION_ENABLED

  NetFWLogging
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-logging-enabled
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_LOGGING_ENABLED

  NetFWMultiAZ
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-multi-az-enabled
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_MULTI_AZ_ENABLED

  NetFWPolicyFragments
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-policy-default-action-fragment-packets
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_POLICY_DEFAULT_ACTION_FRAGMENT_PACKETS
        InputParameters:
          statelessFragmentDefaultActions:
            Ref: StatelessFragmentDefaultActions

  NetFWPolicyFullPackets
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-policy-default-action-full-packets
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_POLICY_DEFAULT_ACTION_FULL_PACKETS
        InputParameters:
          statelessDefaultActions:
            Ref: StatelessDefaultActions

  NetFWPolicyRuleGroup:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-policy-rule-group-associated
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_POLICY_RULE_GROUP_ASSOCIATED

  NetFWStatelessNotEmpty:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-stateless-rule-group-not-empty
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_STATELESS_RULE_GROUP_NOT_EMPTY

  NetFWSubnetProtection:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: netfw-subnet-change-protection-enabled
        Source:
          Owner: AWS
          SourceIdentifier: NETFW_SUBNET_CHANGE_PROTECTION_ENABLED

  # ============================================
