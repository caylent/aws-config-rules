##################################################################################
# Conformance Pack: AI/ML Security & Governance Supporting Infrastructure
#
# Description: This conformance pack provides AWS Managed rules for AI workload
# supporting infrastructure security. 
#
# Total Rules: 72 
#
# Coverage:
# - CloudWatch: 5 rules (monitoring & logging)
# - IAM: 6 rules (access control)
# - KMS: 1 rule (encryption keys)
# - VPC: 4 rules (network isolation)
# - CloudTrail: 9 rules (audit logging & data events)
# - Lambda: 4 rules (event-driven compute)
# - WAFv2: 8 rules (API protection)
# - Cognito: 8 rules (user authentication)
# - Network Firewall: 8 rules (network security)
# - GuardDuty: 11 rules (threat detection)
# - Security Hub: 1 rule (security posture)
# - Inspector: 4 rules (vulnerability scanning)
# - Macie: 2 rules (sensitive data discovery)
# - Access Analyzer: 1 rule (external access)
#
# IMPORTANT: Rules with Configurable Parameters
# 1. cloudwatch-alarm-action-check
#    - alarmActionRequired: "true"
#    - insufficientDataActionRequired: "false"
#    - okActionRequired: "false"
#
# 2. netfw-policy-default-action-fragment-packets
#    - statelessFragmentDefaultActions: "aws:drop"
#
# 3. netfw-policy-default-action-full-packets
#    - statelessDefaultActions: "aws:drop"
#
# 4. lambda-function-system-log-level-check
#    - logLevel: "WARN"
#
# 5. lambda-function-application-log-level-check
#    - logLevel: "INFO"
##################################################################################

Parameters:
  AlarmActionRequired:
    Type: String
    Default: "true"
  InsufficientDataActionRequired:
    Type: String
    Default: "false"
  OkActionRequired:
    Type: String
    Default: "false"
  StatelessFragmentDefaultActions:
    Type: String
    Default: "aws:drop"
  StatelessDefaultActions:
    Type: String
    Default: "aws:drop"
  LambdaSystemLogLevel:
    Type: String
    Default: "WARN"
  LambdaApplicationLogLevel:
    Type: String
    Default: "INFO"

Resources:

  # ============================================
  # CloudWatch - Monitoring & Logging (5 rules)
  # ============================================

  CloudWatchLogGroupEncrypted:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cloudwatch-log-group-encrypted
        Source:
          Owner: AWS
          SourceIdentifier: CLOUDWATCH_LOG_GROUP_ENCRYPTED

  CloudWatchAlarmActionCheck:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cloudwatch-alarm-action-check
        Source:
          Owner: AWS
          SourceIdentifier: CLOUDWATCH_ALARM_ACTION_CHECK
        InputParameters:
          alarmActionRequired:
            Ref: AlarmActionRequired
          insufficientDataActionRequired:
            Ref: InsufficientDataActionRequired
          okActionRequired:
            Ref: OkActionRequired

  CloudWatchAlarmDescription
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cloudwatch-alarm-description
        Source:
          Owner: AWS
          SourceIdentifier: CLOUDWATCH_ALARM_DESCRIPTION

  CloudWatchLogGroupRetentionPeriod:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cw-loggroup-retention-period-check
        Source:
          Owner: AWS
          SourceIdentifier: CW_LOGGROUP_RETENTION_PERIOD_CHECK

  CloudWatchMetricStreamTagged
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cloudwatch-metric-stream-tagged
        Source:
          Owner: AWS
          SourceIdentifier: CLOUDWATCH_METRIC_STREAM_TAGGED

  # ============================================
  # IAM - Access Control (6 rules)
  # ============================================

  IAMPasswordPolicy:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: iam-password-policy
        Source:
          Owner: AWS
          SourceIdentifier: IAM_PASSWORD_POLICY

  IAMPolicyNoStatementsWithAdminAccess:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: iam-policy-no-statements-with-admin-access
        Source:
          Owner: AWS
          SourceIdentifier: IAM_POLICY_NO_STATEMENTS_WITH_ADMIN_ACCESS

  IAMPolicyDescription
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: iam-policy-description
        Source:
          Owner: AWS
          SourceIdentifier: IAM_POLICY_DESCRIPTION

  IAMRootAccessKeyCheck:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: iam-root-access-key-check
        Source:
          Owner: AWS
          SourceIdentifier: IAM_ROOT_ACCESS_KEY_CHECK

  IAMUserMFAEnabled:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: iam-user-mfa-enabled
        Source:
          Owner: AWS
          SourceIdentifier: IAM_USER_MFA_ENABLED

  IAMUserNoPoliciesCheck:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: iam-user-no-policies-check
        Source:
          Owner: AWS
          SourceIdentifier: IAM_USER_NO_POLICIES_CHECK

  # ============================================
  # KMS - Encryption Keys (1 rule)
  # ============================================

  KMSBackingKeyRotationEnabled:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: kms-backing-key-rotation-enabled
        Source:
          Owner: AWS
          SourceIdentifier: CMK_BACKING_KEY_ROTATION_ENABLED

  # ============================================
  # VPC - Network Isolation (4 rules)
  # ============================================

  VPCDefaultSecurityGroupClosed:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: vpc-default-security-group-closed
        Source:
          Owner: AWS
          SourceIdentifier: VPC_DEFAULT_SECURITY_GROUP_CLOSED

  VPCFlowLogsEnabled:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: vpc-flow-logs-enabled
        Source:
          Owner: AWS
          SourceIdentifier: VPC_FLOW_LOGS_ENABLED

  VPCNetworkACLUnusedCheck:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: vpc-network-acl-unused-check
        Source:
          Owner: AWS
          SourceIdentifier: VPC_NETWORK_ACL_UNUSED_CHECK

  VPCSGOpenOnlyToAuthorizedPorts:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: vpc-sg-open-only-to-authorized-ports
        Source:
          Owner: AWS
          SourceIdentifier: VPC_SG_OPEN_ONLY_TO_AUTHORIZED_PORTS

  # ============================================
  # CloudTrail - Audit Logging (3 rules)
  # ============================================

  CloudTrailEnabled:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cloudtrail-enabled
        Source:
          Owner: AWS
          SourceIdentifier: CLOUD_TRAIL_ENABLED

  CloudTrailLogValidation:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cloud-trail-log-file-validation-enabled
        Source:
          Owner: AWS
          SourceIdentifier: CLOUD_TRAIL_LOG_FILE_VALIDATION_ENABLED

  CloudTrailEventDataStoreMultiRegion
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: cloudtrail-event-data-store-multi-region
        Source:
          Owner: AWS
          SourceIdentifier: CLOUDTRAIL_EVENT_DATA_STORE_MULTI_REGION

  # ============================================
  # Lambda - Event-Driven Compute (4 rules)
  # ============================================

  LambdaInsideVPC:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: lambda-inside-vpc
