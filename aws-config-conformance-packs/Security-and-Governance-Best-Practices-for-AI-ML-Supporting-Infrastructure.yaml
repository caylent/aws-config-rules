          SourceIdentifier: GUARDDUTY_ENABLED_CENTRALIZED

  GuardDutyS3Protection:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-s3-protection-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_S3_PROTECTION_ENABLED

  GuardDutyEKSAudit:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-eks-protection-audit-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_EKS_PROTECTION_AUDIT_ENABLED

  GuardDutyEKSRuntime
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-eks-protection-runtime-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_EKS_PROTECTION_RUNTIME_ENABLED

  GuardDutyLambda:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-lambda-protection-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_LAMBDA_PROTECTION_ENABLED

  GuardDutyMalware
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-malware-protection-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_MALWARE_PROTECTION_ENABLED

  GuardDutyRDS
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-rds-protection-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_RDS_PROTECTION_ENABLED

  GuardDutyEC2Runtime
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-ec2-protection-runtime-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_EC2_PROTECTION_RUNTIME_ENABLED

  GuardDutyECSRuntime
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: guardduty-ecs-protection-runtime-enabled
        Source:
          Owner: AWS
          SourceIdentifier: GUARDDUTY_ECS_PROTECTION_RUNTIME_ENABLED

  GuardDutyRuntimeMonitoring
