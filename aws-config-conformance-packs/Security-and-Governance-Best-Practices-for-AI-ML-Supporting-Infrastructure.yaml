  LambdaFunctionLogFormatJson
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: lambda-function-log-format-json
        Source:
          Owner: AWS
          SourceIdentifier: LAMBDA_FUNCTION_LOG_FORMAT_JSON

  LambdaFunctionApplicationLogLevelCheck
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: lambda-function-application-log-level-check
        Source:
          Owner: AWS
          SourceIdentifier: LAMBDA_FUNCTION_APPLICATION_LOG_LEVEL_CHECK
        InputParameters:
          logLevel:
            Ref: LambdaApplicationLogLevel

  LambdaFunctionSystemLogLevelCheck
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: lambda-function-system-log-level-check
        Source:
          Owner: AWS
          SourceIdentifier: LAMBDA_FUNCTION_SYSTEM_LOG_LEVEL_CHECK
        InputParameters:
          logLevel:
            Ref: LambdaSystemLogLevel

  # ============================================
  # WAFv2 - API Protection (8 rules)
  # ============================================

  WAFv2Logging:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: wafv2-logging-enabled
        Source:
          Owner: AWS
          SourceIdentifier: WAFV2_LOGGING_ENABLED

  WAFv2RuleGroupLogging
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: wafv2-rulegroup-logging-enabled
        Source:
          Owner: AWS
          SourceIdentifier: WAFV2_RULEGROUP_LOGGING_ENABLED

  WAFv2RuleGroupNotEmpty
    Condition: CommercialPartition:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: wafv2-rulegroup-not-empty
        Source:
          Owner: AWS
          SourceIdentifier: WAFV2_RULEGROUP_NOT_EMPTY

  WAFv2WebACLNotEmpty
    Condition: CommercialPartition:
